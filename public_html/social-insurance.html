<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Social Insurance Application Form</title>\n    <script>\n        function sendMessage() {\n            const applicantData = {\n                fullName: document.getElementById('fullName').value,\n                nationalID: document.getElementById('nationalID').value,\n                birthDate: document.getElementById('birthDate').value,\n                address: document.getElementById('address').value,\n                iban: document.getElementById('iban').value,\n            };\n            const dependents = [];\n            const dependentElements = document.getElementsByClassName('dependent');\n            for (let i = 0; i < dependentElements.length; i++) {\n                const name = dependentElements[i].querySelector('.depName').value;\n                const id = dependentElements[i].querySelector('.depID').value;\n                const bDate = dependentElements[i].querySelector('.depBirthDate').value;\n                if (name && id && bDate) {\n                    dependents.push({ name, id, bDate });\n                }\n            }\n            const message = `Hello,\n\nI would like to apply for social insurance with the following details:\n\nApplicant: ${applicantData.fullName}\nNational ID: ${applicantData.nationalID}\nBirth Date: ${applicantData.birthDate}\nAddress: ${applicantData.address}\nIBAN: ${applicantData.iban}\n\nDependents:\n` + dependents.map(dep => `Name: ${dep.name}, National ID: ${dep.id}, Birth Date: ${dep.bDate}`).join('\n') + `\n\nBest regards.`;\n            const phoneNumber = '966501234567';\n            const whatsappUrl = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;\n            window.open(whatsappUrl);\n        }\n        function addDependent() {\n            const dependentDiv = document.createElement('div');\n            dependentDiv.classList.add('dependent');\n            dependentDiv.innerHTML = `\n                <input type='text' class='depName' placeholder='Dependent Name' required />\n                <input type='text' class='depID' placeholder='Dependent National ID' required />\n                <input type='date' class='depBirthDate' placeholder='Dependent Birth Date' required />\n            `;\n            document.getElementById('dependents').appendChild(dependentDiv);\n        }\n    <\/script>\n</head>\n<body>\n    <h1>Social Insurance Application Form</h1>\n    <form onsubmit="event.preventDefault(); sendMessage();">\n        <label for="fullName">Full Name:</label>\n        <input type="text" id="fullName" required><br>\n        <label for="nationalID">National ID:</label>\n        <input type="text" id="nationalID" required><br>\n        <label for="birthDate">Birth Date:</label>\n        <input type="date" id="birthDate" required><br>\n        <label for="address">Residence Address:</label>\n        <input type="text" id="address" required><br>\n        <label for="iban">IBAN:</label>\n        <input type="text" id="iban" required><br>\n        <div id="dependents">\n            <h3>Dependents</h3>\n        </div>\n        <button type="button" onclick="addDependent()">Add Dependent</button><br><br>\n        <button type="submit">Submit</button>\n    </form>\n</body>\n</html>
